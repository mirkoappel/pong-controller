<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RETROCON</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  width: 100dvw;
  height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Courier New', monospace;
  overflow: hidden;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,0.18) 3px, rgba(0,0,0,0) 4px);
  pointer-events: none;
}

#logo {
  display: flex;
  gap: 0.05em;
}

.letter {
  font-size: clamp(2.5rem, 9vw, 6rem);
  letter-spacing: 0.08em;
  color: #4fc3f7;
  opacity: 0;
  text-shadow:
    0 0 40px rgba(79,195,247,0.9),
    0 0 80px rgba(79,195,247,0.4);
  animation: appear 0.12s forwards;
}

@keyframes appear {
  0%   { opacity: 0; filter: brightness(8) blur(4px); }
  60%  { opacity: 1; filter: brightness(2) blur(0px); }
  100% { opacity: 1; filter: brightness(1) blur(0px); }
}
</style>
</head>
<body>
<div id="logo"></div>
<script>
const WORD = 'RETROCON';
const DELAY_PER_LETTER = 120; // ms zwischen Buchstaben
const REDIRECT_AFTER   = WORD.length * DELAY_PER_LETTER + 1200;

// ── Buchstaben einblenden ────────────────────────────────
const logo = document.getElementById('logo');
WORD.split('').forEach((ch, i) => {
  const span = document.createElement('span');
  span.className = 'letter';
  span.textContent = ch;
  span.style.animationDelay = (i * DELAY_PER_LETTER) + 'ms';
  logo.appendChild(span);
});

// ── Sound ────────────────────────────────────────────────
function playSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  function tone(freq, start, dur, vol = 0.12, type = 'square') {
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    const t   = ctx.currentTime + start;
    osc.type = type; osc.frequency.value = freq;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(g).connect(ctx.destination);
    osc.start(t); osc.stop(t + dur + 0.05);
  }
  // Aufsteigendes Arpeggio synchron zu den Buchstaben
  [262, 294, 330, 370, 392, 440, 494, 523].forEach((freq, i) => {
    tone(freq, i * (DELAY_PER_LETTER / 1000), 0.18, 0.1);
  });
  // Abschlusskord
  const end = WORD.length * (DELAY_PER_LETTER / 1000) + 0.1;
  [523, 659, 784].forEach((f, i) => tone(f, end + i * 0.03, 0.8, 0.07));
}

try { playSound(); } catch {}

// ── Weiterleitung ────────────────────────────────────────
setTimeout(() => { location.href = 'console.html'; }, REDIRECT_AFTER);
</script>
</body>
</html>
