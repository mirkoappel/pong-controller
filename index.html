<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RETROCON</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  width: 100dvw;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Courier New', monospace;
  overflow: hidden;
  cursor: pointer;
  user-select: none;
  gap: 50px;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,0.2) 3px, rgba(0,0,0,0) 4px);
  pointer-events: none;
}

/* ── Logo ───────────────────────────────────────────────── */
#logo {
  display: flex;
  opacity: 0;
  transition: opacity 0.2s;
}
#logo.visible { opacity: 1; }

.letter {
  font-size: clamp(2.5rem, 9vw, 6rem);
  letter-spacing: 0.08em;
  color: #4fc3f7;
  opacity: 0;
  text-shadow: 0 0 40px rgba(79,195,247,0.9), 0 0 80px rgba(79,195,247,0.4);
}
.letter.pop { animation: appear 0.14s forwards; }
@keyframes appear {
  0%   { opacity: 0; filter: brightness(8) blur(4px); }
  60%  { opacity: 1; filter: brightness(2) blur(0); }
  100% { opacity: 1; filter: brightness(1) blur(0); }
}

/* ── Insert Coin ────────────────────────────────────────── */
#insert-coin {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  transition: opacity 0.2s;
}
#insert-coin.hidden { opacity: 0; pointer-events: none; }

#coin-icon {
  width: 52px; height: 52px;
  border-radius: 50%;
  border: 3px solid #f5c518;
  display: flex; align-items: center; justify-content: center;
  color: #f5c518;
  font-size: 1.4rem;
  box-shadow: 0 0 16px rgba(245,197,24,0.3);
  animation: coinpulse 2s ease-in-out infinite;
}
@keyframes coinpulse {
  0%,100% { box-shadow: 0 0 16px rgba(245,197,24,0.3); }
  50%     { box-shadow: 0 0 28px rgba(245,197,24,0.6); }
}

#coin-text {
  font-size: clamp(0.9rem, 3vw, 1.2rem);
  letter-spacing: 0.4rem;
  color: #f5c518;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

#coin-sub {
  font-size: 0.6rem;
  letter-spacing: 0.25rem;
  color: #333;
}
</style>
</head>
<body>

<div id="logo"></div>

<div id="insert-coin">
  <div id="coin-icon">¢</div>
  <div id="coin-text">INSERT COIN</div>
  <div id="coin-sub">CLICK OR TOUCH ANYWHERE</div>
</div>

<script>
const WORD  = 'RETROCON';
const DELAY = 110;
const logo  = document.getElementById('logo');
const coinEl = document.getElementById('insert-coin');
let booted  = false;

WORD.split('').forEach(ch => {
  const s = document.createElement('span');
  s.className = 'letter';
  s.textContent = ch;
  logo.appendChild(s);
});

// ── Coin-Sound ───────────────────────────────────────────
function playCoin(ctx) {
  const t = ctx.currentTime;

  // Metallisches Klirren: kurzer Rausch-Burst
  const buf  = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
  const noise = ctx.createBufferSource();
  const ng = ctx.createGain();
  const nf = ctx.createBiquadFilter();
  nf.type = 'bandpass'; nf.frequency.value = 3000; nf.Q.value = 1;
  ng.gain.setValueAtTime(0.3, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  noise.buffer = buf;
  noise.connect(nf).connect(ng).connect(ctx.destination);
  noise.start(t);

  // Klingeln: absteigende Frequenz
  const osc = ctx.createOscillator();
  const og  = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(1200, t + 0.02);
  osc.frequency.exponentialRampToValueAtTime(400, t + 0.25);
  og.gain.setValueAtTime(0.2, t + 0.02);
  og.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  osc.connect(og).connect(ctx.destination);
  osc.start(t + 0.02); osc.stop(t + 0.35);
}

function playBoot(ctx) {
  function tone(freq, start, dur, vol = 0.1, type = 'square') {
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    const t   = ctx.currentTime + start;
    osc.type = type; osc.frequency.value = freq;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(g).connect(ctx.destination);
    osc.start(t); osc.stop(t + dur + 0.05);
  }
  [262,294,330,370,392,440,494,523].forEach((f, i) =>
    tone(f, 0.35 + i * (DELAY / 1000), 0.16, 0.1)
  );
  const end = 0.35 + WORD.length * (DELAY / 1000);
  [523,659,784].forEach((f, i) => tone(f, end + i * 0.03, 0.9, 0.07));
}

// ── Boot ─────────────────────────────────────────────────
function boot() {
  if (booted) return;
  booted = true;

  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  playCoin(ctx);
  playBoot(ctx);

  coinEl.classList.add('hidden');

  setTimeout(() => {
    logo.classList.add('visible');
    logo.querySelectorAll('.letter').forEach((el, i) =>
      setTimeout(() => el.classList.add('pop'), 350 + i * DELAY)
    );
  }, 200);

  const total = 350 + WORD.length * DELAY + 1300;
  setTimeout(() => { location.href = 'console.html'; }, total);
}

document.addEventListener('click',      boot, { once: true });
document.addEventListener('touchstart', e => { e.preventDefault(); boot(); }, { once: true, passive: false });
document.addEventListener('keydown',    boot, { once: true });
</script>
</body>
</html>
