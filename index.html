<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RETROCON</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Courier New', monospace;
  color: #fff;
  overflow: hidden;
  gap: 50px;
  padding: 20px;
}

/* Subtle CRT scanlines */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,0.18) 3px, rgba(0,0,0,0) 4px);
  pointer-events: none;
  z-index: 100;
}

h1 {
  font-size: clamp(2rem, 7vw, 4.5rem);
  letter-spacing: 0.5rem;
  text-shadow: 0 0 24px rgba(79, 195, 247, 0.5), 0 0 4px rgba(79,195,247,0.8);
  text-align: center;
}
.subtitle {
  color: #333;
  font-size: 0.7rem;
  letter-spacing: 0.4rem;
  margin-top: -40px;
  text-align: center;
}

.menu {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: min(90vw, 340px);
}
.menu.hidden { display: none; }

.menu-btn {
  background: #111;
  border: 2px solid #333;
  color: #fff;
  font-family: inherit;
  font-size: 1rem;
  letter-spacing: 0.15rem;
  padding: 18px 24px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}
.menu-btn:hover, .menu-btn:focus {
  border-color: #4fc3f7;
  background: #0e1a20;
  box-shadow: 0 0 16px rgba(79, 195, 247, 0.3);
  outline: none;
}
.menu-btn.secondary {
  background: transparent;
  border-color: #1e1e1e;
  color: #555;
  font-size: 0.8rem;
}
.menu-btn.secondary:hover {
  border-color: #333;
  color: #888;
  box-shadow: none;
}

/* Code entry */
.code-input {
  background: #111;
  border: 2px solid #333;
  color: #4fc3f7;
  font-family: inherit;
  font-size: 2.4rem;
  letter-spacing: 0.6rem;
  padding: 16px 20px;
  width: 100%;
  border-radius: 6px;
  text-align: center;
  text-transform: uppercase;
  text-shadow: 0 0 12px rgba(79,195,247,0.6);
}
.code-input:focus {
  outline: none;
  border-color: #4fc3f7;
  box-shadow: 0 0 16px rgba(79, 195, 247, 0.3);
}
.code-input::placeholder { color: #222; letter-spacing: 0.6rem; }

#error-msg {
  color: #f44336;
  font-size: 0.75rem;
  letter-spacing: 0.1rem;
  text-align: center;
  min-height: 1em;
}

#footer {
  position: fixed;
  bottom: 14px;
  color: #222;
  font-size: 0.65rem;
  letter-spacing: 0.1rem;
  z-index: 101;
}
</style>
</head>
<body>

<h1>RETROCON</h1>
<div class="subtitle">RETRO GAMES · HANDY ALS CONTROLLER</div>

<div class="menu" id="main-menu">
  <button class="menu-btn" onclick="newConsole()">NEUE CONSOLE</button>
  <button class="menu-btn" onclick="showJoin()">CONSOLE BEITRETEN</button>
</div>

<div class="menu hidden" id="join-menu">
  <input class="code-input" id="join-code" maxlength="4" placeholder="• • • •" autocapitalize="characters" autocomplete="off">
  <div id="error-msg"></div>
  <button class="menu-btn" onclick="joinConsole()">VERBINDEN</button>
  <button class="menu-btn secondary" onclick="showMain()">ZURÜCK</button>
</div>

<div id="footer">v0.2.0</div>

<script>
function newConsole() {
  location.href = 'console.html';
}

function showJoin() {
  document.getElementById('main-menu').classList.add('hidden');
  document.getElementById('join-menu').classList.remove('hidden');
  setTimeout(() => document.getElementById('join-code').focus(), 50);
}
function showMain() {
  document.getElementById('join-menu').classList.add('hidden');
  document.getElementById('main-menu').classList.remove('hidden');
  document.getElementById('error-msg').textContent = '';
}

function joinConsole() {
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (code.length !== 4) {
    document.getElementById('error-msg').textContent = '4-STELLIGEN CODE EINGEBEN';
    return;
  }
  // Phone joins as controller for that console
  location.href = `controller.html?code=${code}`;
}

const codeInput = document.getElementById('join-code');
codeInput.addEventListener('input', e => {
  e.target.value = e.target.value.toUpperCase().replace(/[^A-Z2-9]/g, '');
});
codeInput.addEventListener('keypress', e => {
  if (e.key === 'Enter') joinConsole();
});
</script>
</body>
</html>
