<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RETROCON</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script>
  // Canvas nutzt Webfonts nur, wenn sie geladen sind — vorab anfordern
  if (document.fonts) document.fonts.load("16px 'Press Start 2P'");
</script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Setup-Screen (QR-Codes) ───────────────────────── -->
<div class="screen active" id="setup">
  <h1>VERBINDE DEIN SMARTPHONE ALS GAME-CONTROLLER</h1>
  <div id="qr-row">
    <div class="player-card">
      <div class="label">SPIELER 1</div>
      <div class="qr-wrap" id="qr-wrap-1"><div id="qr-1"></div></div>
      <div class="status-dot" id="dot-1">WARTE AUF VERBINDUNG</div>
    </div>
    <div class="player-card">
      <div class="label">SPIELER 2</div>
      <div class="qr-wrap" id="qr-wrap-2"><div id="qr-2"></div></div>
      <div class="status-dot" id="dot-2">WARTE AUF VERBINDUNG</div>
    </div>
  </div>
  <div id="setup-hint"></div>
</div>

<!-- ── Hauptmenü ─────────────────────────────────────── -->
<div class="screen" id="main-menu">
  <h1 class="retrocon-logo">RETROCON</h1>
  <div id="carousel">
    <div class="carousel-arrow left">◀</div>
    <div id="carousel-track"></div>
    <div class="carousel-arrow right">▶</div>
  </div>
  <div id="menu-legend">
    <button class="legend-item" data-action="game">
      <span class="btn-key">A</span><span class="legend-label">SPIEL AUSWÄHLEN</span>
    </button>
    <button class="legend-item" data-action="settings">
      <span class="btn-key">B</span><span class="legend-label">EINSTELLUNGEN</span>
    </button>
  </div>
</div>

<!-- ── Einstellungen ─────────────────────────────────── -->
<div class="screen" id="settings">
  <div class="room-badge">RAUM <span id="settings-badge-code"></span></div>
  <h2>SPIELER HINZUFÜGEN</h2>
  <div id="qr-row-s">
    <div class="player-card">
      <div class="label">SPIELER 1</div>
      <div class="qr-wrap" id="qr-wrap-s1"><div id="qr-s1"></div></div>
      <div class="status-dot" id="dot-s1">WARTE…</div>
    </div>
    <div class="player-card">
      <div class="label">SPIELER 2</div>
      <div class="qr-wrap" id="qr-wrap-s2"><div id="qr-s2"></div></div>
      <div class="status-dot" id="dot-s2">OPTIONAL</div>
    </div>
  </div>
  <button class="menu-item" data-action="back" style="margin-top:10px">ZURÜCK <span class="badge">B</span></button>
</div>

<!-- ── Game-View ─────────────────────────────────────── -->
<div id="game-view" style="display:none">
  <canvas id="game-canvas"></canvas>
</div>

<div id="footer">v0.3.0</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="../games/pong/pong.js"></script>
<script>
const ALPHABET = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
function genCode() {
  let s = '';
  for (let i = 0; i < 4; i++) s += ALPHABET[Math.floor(Math.random() * ALPHABET.length)];
  return s;
}

let code = '';
let peer = null;
const conns = new Map();
const lastInput = new Map();
const prevInput = new Map();

let activeScreen = 'setup';

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(name);
  if (el) el.classList.add('active');
  activeScreen = name;
}

// ── PeerJS-Setup ─────────────────────────────────────────
function setupPeer(attempt = 0) {
  code = genCode();
  peer = new Peer('console-' + code);

  peer.on('open', () => {
    const base = location.href.replace(/console\/(index\.html)?.*$/, '');
    const url1 = `${base}controller/?code=${code}&player=1`;
    const url2 = `${base}controller/?code=${code}&player=2`;

    document.getElementById('settings-badge-code').textContent = code;

    const qrOpts = { width: 180, height: 180, correctLevel: QRCode.CorrectLevel.M };
    new QRCode(document.getElementById('qr-1'),  { ...qrOpts, text: url1 });
    new QRCode(document.getElementById('qr-2'),  { ...qrOpts, text: url2 });
    new QRCode(document.getElementById('qr-s1'), { ...qrOpts, text: url1 });
    new QRCode(document.getElementById('qr-s2'), { ...qrOpts, text: url2 });
  });

  peer.on('error', err => {
    if (err.type === 'unavailable-id' && attempt < 5) { peer.destroy(); setupPeer(attempt + 1); }
  });

  peer.on('connection', conn => {
    const player = conn.metadata?.player || 1;
    if (conns.has(player)) { try { conns.get(player).close(); } catch {} }
    conns.set(player, conn);

    conn.on('open',  () => setPlayerConnected(player, true));
    conn.on('close', () => {
      if (conns.get(player) === conn) {
        conns.delete(player); lastInput.delete(player);
        setPlayerConnected(player, false);
        currentGame?.onDisconnect?.(player);
      }
    });
    conn.on('data', data => {
      if (data?.type !== 'gamepad') return;
      prevInput.set(player, lastInput.get(player) ?? null);
      lastInput.set(player, data);
      if (currentGame) currentGame.input?.(player, data, prevInput.get(player));
      else handleMenuInput(player, data, prevInput.get(player));
    });
  });
}

function setPlayerConnected(player, on) {
  const wrap = document.getElementById(`qr-wrap-${player}`);
  const dot  = document.getElementById(`dot-${player}`);
  if (wrap) wrap.classList.toggle('connected', on);
  if (dot)  { dot.classList.toggle('connected', on); dot.textContent = on ? 'VERBUNDEN' : 'WARTE AUF VERBINDUNG'; }
  const hint = document.getElementById('setup-hint');
  if (hint) {
    if (conns.size > 0) {
      hint.classList.add('ready');
      hint.textContent = 'DRÜCKE A ZUM STARTEN';
    } else {
      hint.classList.remove('ready');
      hint.textContent = '';
    }
  }
}

setupPeer();


// ── Karussell aufbauen ───────────────────────────────────
const gameIds = Object.keys(window.RetroGames || {});
const track = document.getElementById('carousel-track');
const carousel = document.getElementById('carousel');

gameIds.forEach(id => {
  const g = window.RetroGames[id];
  const card = document.createElement('div');
  card.className = 'game-card';
  card.dataset.game = id;
  card.innerHTML = `
    <div class="art">${g.artSvg || ''}</div>
    <div class="meta">
      <div class="title">${g.name}</div>
      <div class="tagline">${g.tagline || ''}</div>
    </div>
  `;
  card.addEventListener('click', () => {
    if (carouselIdx === gameIds.indexOf(id)) startGame(id);
    else { carouselIdx = gameIds.indexOf(id); menuSection = 'carousel'; highlightMenu(); }
  });
  track.appendChild(card);
});

let carouselIdx = 0;
let legendIdx = 0;
let menuSection = 'carousel'; // 'carousel' | 'legend'
const legendItems = () => [...document.querySelectorAll('#menu-legend .legend-item')];

function highlightMenu() {
  const cards = [...track.children];
  cards.forEach((el, i) => el.classList.toggle('selected', i === carouselIdx && menuSection === 'carousel'));

  const selected = cards[carouselIdx];
  if (selected) {
    const offset = selected.offsetLeft + selected.offsetWidth / 2 - carousel.clientWidth / 2;
    track.style.transform = `translateX(${-offset}px)`;
  }

  carousel.classList.toggle('has-prev', carouselIdx > 0);
  carousel.classList.toggle('has-next', carouselIdx < cards.length - 1);

  legendItems().forEach((el, i) => el.classList.toggle('selected', menuSection === 'legend' && i === legendIdx));
}

function activateLegend(action) {
  if (action === 'game')     startGame(gameIds[carouselIdx]);
  if (action === 'settings') showScreen('setup');
}

function handleMenuInput(player, gp, prev) {
  if (activeScreen === 'setup') {
    if (gp.a && !prev?.a) { showScreen('main-menu'); menuSection = 'carousel'; carouselIdx = 0; highlightMenu(); }
    return;
  }
  if (activeScreen === 'main-menu') {
    // Direkte Shortcuts immer verfügbar
    if (gp.a && !prev?.a) {
      if (menuSection === 'legend') activateLegend(legendItems()[legendIdx]?.dataset.action);
      else startGame(gameIds[carouselIdx]);
      return;
    }
    if (gp.b && !prev?.b) { showScreen('setup'); return; }

    if (menuSection === 'carousel') {
      if (gp.dpad.right && !prev?.dpad?.right && carouselIdx < gameIds.length - 1) { carouselIdx++; highlightMenu(); }
      if (gp.dpad.left  && !prev?.dpad?.left  && carouselIdx > 0)                 { carouselIdx--; highlightMenu(); }
      if (gp.dpad.down  && !prev?.dpad?.down) { menuSection = 'legend'; legendIdx = 0; highlightMenu(); }
    } else {
      const items = legendItems();
      if (gp.dpad.down && !prev?.dpad?.down && legendIdx < items.length - 1) { legendIdx++; highlightMenu(); }
      if (gp.dpad.up   && !prev?.dpad?.up) {
        if (legendIdx > 0) { legendIdx--; highlightMenu(); }
        else { menuSection = 'carousel'; highlightMenu(); }
      }
    }
  }
}

legendItems().forEach(el => {
  el.addEventListener('click', () => activateLegend(el.dataset.action));
});

highlightMenu();
window.addEventListener('resize', highlightMenu);

// ── Game-Loader ──────────────────────────────────────────
let currentGame = null, rafId = null;
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const gameView = document.getElementById('game-view');

function resizeCanvas() {
  canvas.width  = canvas.clientWidth  * devicePixelRatio;
  canvas.height = canvas.clientHeight * devicePixelRatio;
}
window.addEventListener('resize', () => { resizeCanvas(); currentGame?.resize?.(canvas.width, canvas.height); });

function startGame(name) {
  const mod = window.RetroGames?.[name];
  if (!mod) return;
  gameView.style.display = 'block';
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  resizeCanvas();
  currentGame = mod.create(ctx, canvas.width, canvas.height, Math.max(1, conns.size), {
    exit: exitGame,
    getConns: () => conns,
    code
  });
  for (const [p, gp] of lastInput) currentGame.input?.(p, gp, null);
  let last = performance.now();
  (function loop(now) {
    const dt = Math.min(50, now - last) / 1000; last = now;
    currentGame.update?.(dt);
    currentGame.draw?.();
    rafId = requestAnimationFrame(loop);
  })(performance.now());
}

function exitGame() {
  cancelAnimationFrame(rafId);
  currentGame?.destroy?.();
  currentGame = null;
  gameView.style.display = 'none';
  showScreen('main-menu');
  menuSection = 'carousel';
  highlightMenu();
}
</script>
</body>
</html>
